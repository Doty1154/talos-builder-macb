on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version (e.g. v1.12.7)'
        required: false
        default: 'v1.12.7'
      runner:
        description: 'GitHub Actions runner (e.g. ubuntu-24.04-arm, self-hosted)'
        required: false
        default: 'ubuntu-24.04-arm'

env:
  REGISTRY: ghcr.io
  REGISTRY_USERNAME: ${{ github.repository_owner }}/macb-unified
  # Extensions to bake into the installer image.
  # Format: space-separated list of image:tag references (digests resolved at build time).
  EXTENSION_ISCSI_IMAGE: ghcr.io/siderolabs/iscsi-tools:v0.2.0
  EXTENSION_UTIL_LINUX_IMAGE: ghcr.io/siderolabs/util-linux-tools:2.41.2

jobs:
  build:
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v4
      - uses: imjasonh/setup-crane@v0.4
        with:
          version: v0.20.5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up GitHub Actions bot user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract Talos version from tag
        id: talos-version
        run: |
          # Manual dispatch: use the input directly.
          # Tag trigger: extract vMAJOR.MINOR.PATCH from the tag (e.g. v1.11.6-rpi5 -> v1.11.6).
          if [ -n "${{ github.event.inputs.talos_version }}" ]; then
            TALOS_VERSION="${{ github.event.inputs.talos_version }}"
          else
            TAG="${{ github.ref_name }}"
            TALOS_VERSION=$(echo "$TAG" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
          fi
          echo "TALOS_VERSION=${TALOS_VERSION}" >> $GITHUB_ENV
          echo "Resolved TALOS_VERSION=${TALOS_VERSION}"

      - name: Resolve extension image digests
        run: |
          EXTENSIONS=""
          while IFS= read -r line; do
            IMAGE="${line#*=}"
            DIGEST=$(crane digest "$IMAGE")
            EXTENSIONS="$EXTENSIONS $IMAGE@$DIGEST"
          done < <(env | grep '^EXTENSION_')
          echo "EXTENSIONS=${EXTENSIONS# }" >> $GITHUB_ENV

      # ──────────────────────────────────────────────
      # Raspberry Pi 5
      # ──────────────────────────────────────────────

      - name: "Pi5 — Prepare (checkouts & patches)"
        run: make TALOS_VERSION=${{ env.TALOS_VERSION }} checkouts patches

      - name: "Pi5 — Kernel"
        run: make TALOS_VERSION=${{ env.TALOS_VERSION }} REGISTRY=${{ env.REGISTRY }} REGISTRY_USERNAME=${{ env.REGISTRY_USERNAME }} kernel

      - name: "Pi5 — initramfs and kernel"
        run: make TALOS_VERSION=${{ env.TALOS_VERSION }} REGISTRY=${{ env.REGISTRY }} REGISTRY_USERNAME=${{ env.REGISTRY_USERNAME }} initramfs-kernel

      - name: "Pi5 — Installer base"
        run: make TALOS_VERSION=${{ env.TALOS_VERSION }} REGISTRY=${{ env.REGISTRY }} REGISTRY_USERNAME=${{ env.REGISTRY_USERNAME }} installer-base

      - name: "Pi5 — Imager"
        run: make TALOS_VERSION=${{ env.TALOS_VERSION }} REGISTRY=${{ env.REGISTRY }} REGISTRY_USERNAME=${{ env.REGISTRY_USERNAME }} imager

      - name: "Pi5 — Overlay"
        run: make TALOS_VERSION=${{ env.TALOS_VERSION }} REGISTRY=${{ env.REGISTRY }} REGISTRY_USERNAME=${{ env.REGISTRY_USERNAME }} overlay

      - name: "Pi5 — Build installer image (with extensions)"
        run: |
          make TALOS_VERSION=${{ env.TALOS_VERSION }} \
            REGISTRY=${{ env.REGISTRY }} \
            REGISTRY_USERNAME=${{ env.REGISTRY_USERNAME }} \
            ASSET_TYPE=installer \
            EXTENSIONS="${{ env.EXTENSIONS }}" \
            image
          crane push \
            ./checkouts/talos/_out/installer-arm64.tar \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/installer:${{ github.ref_name }}-arm64-extensions

      - name: "Pi5 — Build metal disk image"
        run: |
          make TALOS_VERSION=${{ env.TALOS_VERSION }} \
            REGISTRY=${{ env.REGISTRY }} \
            REGISTRY_USERNAME=${{ env.REGISTRY_USERNAME }} \
            EXTENSIONS="${{ env.EXTENSIONS }}" \
            image
          mv ./checkouts/talos/_out/metal-arm64.raw.xz ./metal-arm64.raw.xz

      # ──────────────────────────────────────────────
      # Release
      # ──────────────────────────────────────────────

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INSTALLER_PI5="${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/installer:${{ github.ref_name }}"
          NOTES=$(cat <<EOF
          > ⚠️ Experimental build, use at your own risk.

          Patched Talos Linux for **Raspberry Pi CM4 + CM5** (unified `rpi_generic` overlay) using Pi Foundation vendor kernel

          ### Extensions included

          - \`iscsi-tools\` ${{ env.EXTENSION_ISCSI_IMAGE }}
          - \`util-linux-tools\` ${{ env.EXTENSION_UTIL_LINUX_IMAGE }}

          ### Artifacts

          | Platform | Disk image | Installer image |
          |----------|-----------|----------------|
          | **CM4 + CM5 (rpi_generic)** | \`metal-arm64.raw.xz\` | \`${INSTALLER_PI5}\` |

          ### Fresh install

          Download the disk image for your board and flash it:
          \`\`\`bash
          xz -d metal-arm64.raw.xz
          dd if=metal-arm64.raw of=<disk> bs=4M status=progress
          \`\`\`

          ### Upgrade

          \`\`\`bash
          # Raspberry Pi 5
          talosctl upgrade --nodes <NODE_IP> --image ${INSTALLER_PI5}

          EOF
          )
          gh release create \
            ${{ github.ref_name }} \
            metal-arm64.raw.xz \
            --title "${{ github.ref_name }}" \
            --notes "$NOTES"
